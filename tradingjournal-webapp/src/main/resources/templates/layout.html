<!doctype html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${title} ?: 'Casa Zaccariello'">Casa Zaccariello</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" th:href="@{/}">Casa Zaccariello 🍕</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/menu}">Menu</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/ordina}">Ordina</a></li>
      </ul>

      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" th:href="@{/login}">Accedi</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-4">
  <!-- Qui dentro ogni pagina inserirà il suo contenuto -->
  <div th:replace="${content}"></div>
</main>

<footer class="border-top py-3">
  <div class="container small text-muted">
    © <span th:text="${#dates.format(#dates.createNow(),'yyyy')}">2026</span> Casa Zaccariello
  </div>
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
